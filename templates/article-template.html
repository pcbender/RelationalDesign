<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><!-- Article Title --> - Relational Design</title>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.3/cdn.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Article metadata for Alpine.js -->
    <script>
        // Fill out the fields below with your article details
        window.articleData = {
            article: {
                id: 0,
                title: '',
                subtitle: '',
                category: '',
                author: { name: '', bio: '', avatar: '' },
                publishDate: '',
                readTime: '',
                currentPage: 1,
                totalPages: 1
            },
            tableOfContents: [],
            relatedArticles: []
        };
    </script>

    <!-- Reading Progress Bar -->
    <div class="progress-bar" x-data="{ progress: 0, update() { const article = document.querySelector('.article-body'); if (!article) return; const scrollTop = window.pageYOffset; const docHeight = article.offsetHeight; const winHeight = window.innerHeight; const scrollPercent = scrollTop / (docHeight - winHeight); this.progress = Math.min(100, Math.max(0, scrollPercent * 100)); } }" @scroll.window="update()" x-init="update()">
        <div class="progress-fill" :style="`width: ${progress}%`"></div>
    </div>

    <!-- Navigation -->
    <header x-data="{ mobileMenuOpen: false }">
        <nav x-data="{ navigation: [] }" x-init="fetch('data/menu.json').then(r => r.json()).then(data => navigation = data)">
            <div class="logo">Relational Design <img src="img/TriGram.png" alt="Logo" /></div>
            <ul class="nav-menu">
                <template x-for="item in navigation" :key="item.name">
                    <li><a :href="item.href" :class="item.active ? 'text-blue-600' : ''" x-text="item.name"></a></li>
                </template>
            </ul>
            <button class="mobile-menu-btn" @click="mobileMenuOpen = !mobileMenuOpen">
                <span x-show="!mobileMenuOpen">☰</span>
                <span x-show="mobileMenuOpen">✕</span>
            </button>
            <div class="mobile-menu" :class="mobileMenuOpen ? 'show' : ''">
                <ul>
                    <template x-for="item in navigation" :key="item.name">
                        <li><a :href="item.href" x-text="item.name" @click="mobileMenuOpen = false"></a></li>
                    </template>
                </ul>
            </div>
        </nav>
    </header>

    <!-- Article Container -->
    <div class="article-container" x-data="{ article: window.articleData.article, toc: window.articleData.tableOfContents, related: window.articleData.relatedArticles }">
        <!-- Table of Contents -->
        <aside class="toc-sidebar">
            <ul class="toc-list">
                <template x-for="item in toc" :key="item.id">
                    <li><a :href="`#${item.id}`" x-text="item.title"></a></li>
                </template>
            </ul>
        </aside>

        <!-- Article Content -->
        <article class="article-content">
            <div class="article-header">
                <div class="article-meta">
                    <span class="article-category" x-text="article.category"></span>
                    <span x-text="article.publishDate"></span>
                    <span x-text="article.readTime"></span>
                </div>
                <h1 class="article-title" x-text="article.title"></h1>
                <p class="article-subtitle" x-text="article.subtitle"></p>
            </div>
            <div class="article-body">
                <!-- Write your article content here -->
            </div>
            <div class="author-bio">
                <div class="author-avatar" x-text="article.author.avatar"></div>
                <div class="author-info">
                    <h4 x-text="article.author.name"></h4>
                    <p x-text="article.author.bio"></p>
                </div>
            </div>
            <!-- Pagination / related links can be added below -->
        </article>
    </div>

    <!-- Footer -->
    <footer x-data="{ sections: [] }" x-init="fetch('data/footer.json').then(r => r.json()).then(data => sections = data)">
        <div class="footer-content">
            <template x-for="section in sections" :key="section.title">
                <div class="footer-section">
                    <h3 x-text="section.title"></h3>
                    <template x-for="link in section.items" :key="link.name">
                        <a :href="link.href" x-text="link.name"></a>
                    </template>
                </div>
            </template>
        </div>
        <div class="footer-bottom" x-data="{ currentYear: new Date().getFullYear() }">
            <p>&copy; <span x-text="currentYear"></span> Relational Design. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
